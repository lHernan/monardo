<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirthdayDeploymentApplication</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f172a;
    color:#e2e8f0;
    font-family:"JetBrains Mono",monospace;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#111827;
    border-radius:16px;
    padding:20px;
    box-shadow:0 0 40px rgba(0,255,180,0.15);
}

h1{
    text-align:center;
    color:#22d3ee;
    font-size:18px;
}

/* KEYBOARD */
.keyboard-wrapper{
    overflow-x:auto;
    margin:20px 0;
}

.keyboard{
    display:inline-block;
    padding:15px;
    border:3px solid #374151;
    border-radius:14px;
    background:#0b1220;
}

.row{
    display:flex;
    margin-bottom:6px;
}

.key{
    padding:6px 8px;
    margin:2px;
    border-radius:6px;
    background:#1f2937;
    font-size:10px;
    min-width:26px;
    text-align:center;
    transition:0.2s;
    color:#fff;
}

.key.wide{ min-width:60px; }
.key.xwide{ min-width:110px; }
.key.space{ min-width:180px; }

/* RGB animation */
@keyframes rgbWave {
    0% { background: #ff0080; }
    25% { background: #7928ca; }
    50% { background: #00d4ff; }
    75% { background: #00ff88; }
    100% { background: #ff0080; }
}

.rgb .key{
    animation: rgbWave 4s linear infinite;
}

.rgb .key:nth-child(odd){
    animation-delay:0.2s;
}
.rgb .key:nth-child(even){
    animation-delay:0.4s;
}

/* LOGS */
.log{
    font-size:12px;
    white-space:pre-wrap;
    line-height:1.5;
}

/* PIPELINE */
.stage{
    margin:6px 0;
    font-size:13px;
}

.status{
    margin-top:20px;
    font-size:18px;
    text-align:center;
    color:#32cd32;
    text-shadow:0 0 10px #32cd32;
}

button{
    width:100%;
    margin-top:20px;
    background:#22d3ee;
    border:none;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:active{
    transform:scale(0.97);
}

/* Desktop */
@media (min-width:768px){
    h1{font-size:22px;}
    .key{font-size:12px;}
    .log{font-size:14px;}
    .status{font-size:22px;}
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 BirthdayDeploymentApplication v3.0</h1>

<div class="keyboard-wrapper">
<div class="keyboard rgb" id="keyboard">

<div class="row">
<div class="key">Esc</div>
<div class="key">F1</div><div class="key">F2</div><div class="key">F3</div>
<div class="key">F4</div><div class="key">F5</div><div class="key">F6</div>
<div class="key">F7</div><div class="key">F8</div><div class="key">F9</div>
<div class="key">F10</div><div class="key">F11</div><div class="key">F12</div>
</div>

<div class="row">
<div class="key">~</div>
<div class="key">1</div><div class="key">2</div><div class="key">3</div>
<div class="key">4</div><div class="key">5</div><div class="key">6</div>
<div class="key">7</div><div class="key">8</div><div class="key">9</div>
<div class="key">0</div><div class="key">-</div><div class="key">=</div>
<div class="key wide">Back</div>
</div>

<div class="row">
<div class="key wide">Tab</div>
<div class="key">Q</div><div class="key">W</div><div class="key">E</div>
<div class="key">R</div><div class="key">T</div><div class="key">Y</div>
<div class="key">U</div><div class="key">I</div><div class="key">O</div>
<div class="key">P</div><div class="key">[</div><div class="key">]</div>
<div class="key">\</div>
</div>

<div class="row">
<div class="key wide">Caps</div>
<div class="key">A</div><div class="key">S</div><div class="key">D</div>
<div class="key">F</div><div class="key">G</div><div class="key">H</div>
<div class="key">J</div><div class="key" id="kKey">K</div>
<div class="key">L</div><div class="key">;</div>
<div class="key">'</div>
<div class="key wide">Enter</div>
</div>

<div class="row">
<div class="key wide">Shift</div>
<div class="key">Z</div><div class="key">X</div><div class="key">C</div>
<div class="key">V</div><div class="key">B</div><div class="key">N</div>
<div class="key">M</div><div class="key">,</div>
<div class="key">.</div><div class="key">/</div>
<div class="key wide">Shift</div>
</div>

<div class="row">
<div class="key">Ctrl</div>
<div class="key">Win</div>
<div class="key">Alt</div>
<div class="key space">Space</div>
<div class="key">Alt</div>
<div class="key">Fn</div>
<div class="key">←</div>
<div class="key">↓</div>
<div class="key">→</div>
</div>

</div>
</div>

<div id="logs" class="log"></div>

<div id="pipeline">
<div class="stage" id="stage1">[ ] Build</div>
<div class="stage" id="stage2">[ ] Test</div>
<div class="stage" id="stage3">[ ] Package</div>
<div class="stage" id="stage4">[ ] Deploy</div>
</div>

<div id="finalStatus" class="status"></div>

<button onclick="deploy()">EXECUTE DEPLOYMENT</button>

</div>

<script>
const logs = [
"",
":: Spring Boot ::  (v3.0.0.RELEASE)",
"",
"Starting BirthdayDeploymentApplication...",
"Scanning components...",
"Bean 'NuPhyAirV3' initialized.",
"",
"Product: NuPhy Air V3",
"RGB Engine: ENABLED",
"",
"Status: NI PUTA IDEA 🚚"
];

let logIndex=0;
function typeLogs(){
    if(logIndex<logs.length){
        document.getElementById("logs").innerHTML+=logs[logIndex]+"\n";
        logIndex++;
        setTimeout(typeLogs,350);
    }
}
typeLogs();

function deploy(){
    const stages=["stage1","stage2","stage3","stage4"];
    let i=0;
    function next(){
        if(i<stages.length){
            const el=document.getElementById(stages[i]);
            el.innerHTML="[✔] "+el.innerText.slice(4);
            i++;
            setTimeout(next,500);
        }else{
            document.getElementById("finalStatus").innerText=
            "🎉 DEPLOYMENT SUCCESSFUL — NuPhy Air V3 EN ROUTE";
            playThock();
        }
    }
    next();
}

function playThock(){
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type="square";
    osc.frequency.value=130;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.setValueAtTime(0.4,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    osc.stop(ctx.currentTime+0.15);
}

document.addEventListener("keydown",function(e){
    if(e.key.toLowerCase()==="k"){
        document.getElementById("kKey").style.background="#ffffff";
        document.getElementById("kKey").style.color="#000000";
        alert("⌨️ THOCK MODE ACTIVATED: +∞% Mechanical Satisfaction.");
    }
});
</script>

</body>
</html>
